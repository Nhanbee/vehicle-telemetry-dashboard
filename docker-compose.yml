name: vehicle-telemetry

services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb2
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - telemetry-net
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  node-red:
    image: nhanlethanh04/vehicle-telemetry-node-red:1.0.0
    container_name: node-red
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "1880:1880"
    environment:
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      NODE_RED_CREDENTIAL_SECRET: ${NODE_RED_CREDENTIAL_SECRET}
      NODE_RED_INFLUXDB_CONFIG_ID: ${NODE_RED_INFLUXDB_CONFIG_ID:-2ff91cc88122875c}
      ESP32_WS_URL: ${ESP32_WS_URL}
    volumes:
      - node-red-data:/data
      - ./node-red/flows.json:/data/flows.json
    networks:
      - telemetry-net

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GRAFANA_INFLUXDB_TOKEN: ${GRAFANA_INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources/fresh.yml:/etc/grafana/provisioning/datasources/influxdb.yml:ro
      - ./grafana/dashboards/vehicle-telemetry-dashboard.json:/var/lib/grafana/provisioned-dashboards/vehicle-telemetry-dashboard.json:ro
    networks:
      - telemetry-net

networks:
  telemetry-net:

volumes:
  influxdb-data:
  grafana-data:
  node-red-data:
