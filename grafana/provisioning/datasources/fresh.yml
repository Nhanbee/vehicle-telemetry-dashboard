apiVersion: 1

datasources:
  - name: InfluxDB Vehicle
    uid: influxdb-vehicle
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
      httpMode: POST
    secureJsonData:
      token: $GRAFANA_INFLUXDB_TOKEN
